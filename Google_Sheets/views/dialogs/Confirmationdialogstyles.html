<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Google Sans", "Roboto", Arial, sans-serif;
        background: #f0f4ff;
        color: #202124;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .header {
        background: #1a73e8;
        color: white;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .header-title {
        font-size: 18px;
        font-weight: 600;
    }

    .header-subtitle {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 2px;
    }

    .global-actions {
        background: #fff;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #dadce0;
        flex-shrink: 0;
    }

    .global-actions .label {
        font-size: 13px;
        font-weight: 600;
        color: #5f6368;
        margin-right: 4px;
    }

    .progress-info {
        margin-left: auto;
        font-size: 13px;
        color: #5f6368;
    }

    .progress-info span {
        font-weight: 700;
        color: #1a73e8;
    }

    .cards-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .family-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        overflow: hidden;
        border: 1px solid #e0e0e0;
    }

    .family-header {
        background: #f8f9fa;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #e8eaed;
    }

    .family-name {
        font-size: 15px;
        font-weight: 700;
        color: #1a73e8;
    }

    .family-meta {
        font-size: 12px;
        color: #80868b;
        margin-top: 2px;
    }

    .family-bulk-actions {
        display: flex;
        gap: 8px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }

    thead th {
        background: #f1f3f4;
        padding: 10px 16px;
        text-align: left;
        font-weight: 600;
        color: #5f6368;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    tbody tr {
        border-bottom: 1px solid #f1f3f4;
    }

    tbody tr:last-child {
        border-bottom: none;
    }

    tbody td {
        padding: 10px 16px;
        vertical-align: middle;
    }

    .col-field {
        width: 18%;
        font-weight: 600;
        color: #3c4043;
    }

    .col-sheet {
        width: 30%;
        color: #3c4043;
    }

    .col-contact {
        width: 30%;
        color: #3c4043;
    }

    .col-action {
        width: 22%;
    }

    .value-pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 12px;
    }

    .sheet-pill {
        background: #e8f0fe;
        color: #1a73e8;
    }

    .contact-pill {
        background: #fce8e6;
        color: #c5221f;
    }

    .decision-btns {
        display: flex;
        gap: 6px;
    }

    .btn-decide {
        padding: 6px 12px;
        border-radius: 6px;
        border: 2px solid transparent;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.15s ease;
        flex: 1;
        text-align: center;
    }

    .btn-accept {
        background: #f1f3f4;
        color: #3c4043;
        border-color: #dadce0;
    }

    .btn-accept.active {
        background: #e6f4ea;
        color: #137333;
        border-color: #34a853;
    }

    .btn-reject {
        background: #f1f3f4;
        color: #3c4043;
        border-color: #dadce0;
    }

    .btn-reject.active {
        background: #fce8e6;
        color: #c5221f;
        border-color: #ea4335;
    }

    .btn-decide:hover {
        filter: brightness(0.95);
    }

    .btn-sm {
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.15s;
    }

    .btn-sm-accept {
        background: #e6f4ea;
        color: #137333;
        border-color: #34a853;
    }

    .btn-sm-accept:hover {
        background: #ceead6;
    }

    .btn-sm-reject {
        background: #fce8e6;
        color: #c5221f;
        border-color: #ea4335;
    }

    .btn-sm-reject:hover {
        background: #f5c6cb;
    }

    .btn-global {
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px solid;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.15s;
    }

    .btn-global-accept {
        background: #e6f4ea;
        color: #137333;
        border-color: #34a853;
    }

    .btn-global-accept:hover {
        background: #ceead6;
    }

    .btn-global-reject {
        background: #fce8e6;
        color: #c5221f;
        border-color: #ea4335;
    }

    .btn-global-reject:hover {
        background: #f5c6cb;
    }

    .footer {
        background: #fff;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid #dadce0;
        flex-shrink: 0;
    }

    .pending-warning {
        font-size: 13px;
        color: #b06b00;
        display: none;
    }

    .btn-apply {
        padding: 11px 28px;
        background: linear-gradient(135deg, #1a73e8, #1669c1);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.2s;
    }

    .btn-apply:disabled {
        background: #dadce0;
        color: #9aa0a6;
        cursor: not-allowed;
    }

    .btn-apply:not(:disabled):hover {
        background: linear-gradient(135deg, #1669c1, #1557b0);
        transform: translateY(-1px);
    }

    .btn-cancel {
        padding: 11px 20px;
        background: #f1f3f4;
        color: #202124;
        border: 1px solid #dadce0;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
    }

    .btn-cancel:hover {
        background: #e8eaed;
    }

    .result-screen {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        text-align: center;
        padding: 40px;
    }

    .result-icon {
        font-size: 64px;
    }

    .result-title {
        font-size: 22px;
        font-weight: 700;
        color: #202124;
    }

    .result-stats {
        display: flex;
        gap: 20px;
        margin-top: 8px;
    }

    .stat-box {
        padding: 16px 24px;
        border-radius: 10px;
        text-align: center;
        min-width: 110px;
    }

    .stat-box .num {
        font-size: 28px;
        font-weight: 700;
    }

    .stat-box .lbl {
        font-size: 12px;
        margin-top: 4px;
    }

    .stat-accepted {
        background: #e6f4ea;
        color: #137333;
    }

    .stat-rejected {
        background: #fce8e6;
        color: #c5221f;
    }

    .stat-error {
        background: #fff3e0;
        color: #b06b00;
    }

    .loading-overlay {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
    }

    .spinner {
        border: 4px solid #e0e0e0;
        border-top: 4px solid #1a73e8;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .loading-overlay p {
        font-size: 15px;
        color: #5f6368;
    }
</style>
