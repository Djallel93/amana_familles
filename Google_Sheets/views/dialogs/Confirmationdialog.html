<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <?!= include('assets/css/confirmationDialogStyles.html'); ?>
</head>

<body>

    <div class="header" id="mainHeader">
        <div>
            <div class="header-title">🔄 Confirmation de synchronisation</div>
            <div class="header-subtitle" id="headerSubtitle">Choisissez champ par champ ce que vous souhaitez appliquer
            </div>
        </div>
    </div>

    <div class="global-actions" id="globalActions">
        <span class="label">Tout :</span>
        <button class="btn-global btn-global-accept" onclick="bulkDecide('accept')">✅ Tout accepter</button>
        <button class="btn-global btn-global-reject" onclick="bulkDecide('reject')">❌ Tout rejeter</button>
        <div class="progress-info">
            <span id="decidedCount">0</span> / <span id="totalCount">0</span> champs décidés
        </div>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Application des décisions en cours...</p>
    </div>

    <div class="result-screen" id="resultScreen">
        <div class="result-icon">✅</div>
        <div class="result-title">Synchronisation terminée</div>
        <div class="result-stats" id="resultStats"></div>
    </div>

    <div class="footer" id="mainFooter">
        <button class="btn-cancel" onclick="google.script.host.close()">Annuler</button>
        <div style="display:flex; align-items:center; gap:16px;">
            <span class="pending-warning" id="pendingWarning">⚠️ Des champs n'ont pas encore de décision</span>
            <button class="btn-apply" id="applyBtn" disabled onclick="applyDecisions()">✅ Appliquer</button>
        </div>
    </div>

    <script>
        const RAW_CHANGES = <?= JSON.stringify(changes) ?>;
        const decisions = {};
        let totalFields = 0;

        window.onload = function () {
            totalFields = RAW_CHANGES.reduce((sum, f) => sum + f.changes.length, 0);
            document.getElementById('totalCount').textContent = totalFields;
            document.getElementById('headerSubtitle').textContent =
                RAW_CHANGES.length + ' famille(s) · ' + totalFields + ' modification(s) détectée(s)';

            RAW_CHANGES.forEach(family => {
                decisions[family.familyId] = {};
                renderFamilyCard(family);
            });

            updateProgress();
        };

        function renderFamilyCard(family) {
            const card = document.createElement('div');
            card.className = 'family-card';

            const rows = family.changes.map(change => `
                <tr>
                    <td class="col-field">${escHtml(change.label)}</td>
                    <td class="col-sheet"><span class="value-pill sheet-pill">${escHtml(change.sheetValue)}</span></td>
                    <td class="col-contact"><span class="value-pill contact-pill">${escHtml(change.contactValue)}</span></td>
                    <td class="col-action">
                        <div class="decision-btns">
                            <button class="btn-decide btn-accept"
                                id="accept-${family.familyId}-${change.field}"
                                onclick="setDecision('${family.familyId}', '${change.field}', 'accept')">
                                ✅ Accepter
                            </button>
                            <button class="btn-decide btn-reject"
                                id="reject-${family.familyId}-${change.field}"
                                onclick="setDecision('${family.familyId}', '${change.field}', 'reject')">
                                ❌ Rejeter
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            card.innerHTML = `
                <div class="family-header">
                    <div>
                        <div class="family-name">${escHtml(family.familyName)}</div>
                        <div class="family-meta">${family.changes.length} modification(s)</div>
                    </div>
                    <div class="family-bulk-actions">
                        <button class="btn-sm btn-sm-accept" onclick="bulkDecideFamily('${family.familyId}', 'accept')">✅ Tout accepter</button>
                        <button class="btn-sm btn-sm-reject" onclick="bulkDecideFamily('${family.familyId}', 'reject')">❌ Tout rejeter</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Champ</th>
                            <th>Valeur feuille</th>
                            <th>Valeur contact</th>
                            <th>Décision</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;

            document.getElementById('cardsContainer').appendChild(card);
        }

        function setDecision(familyId, field, action) {
            decisions[familyId][field] = action;
            document.getElementById('accept-' + familyId + '-' + field).classList.toggle('active', action === 'accept');
            document.getElementById('reject-' + familyId + '-' + field).classList.toggle('active', action === 'reject');
            updateProgress();
        }

        function bulkDecideFamily(familyId, action) {
            const family = RAW_CHANGES.find(f => f.familyId === familyId);
            if (family) family.changes.forEach(c => setDecision(familyId, c.field, action));
        }

        function bulkDecide(action) {
            RAW_CHANGES.forEach(family => bulkDecideFamily(family.familyId, action));
        }

        function updateProgress() {
            const decided = RAW_CHANGES.reduce((sum, f) => sum + Object.keys(decisions[f.familyId]).length, 0);
            document.getElementById('decidedCount').textContent = decided;
            const allDone = decided >= totalFields;
            document.getElementById('applyBtn').disabled = !allDone;
            document.getElementById('pendingWarning').style.display = (!allDone && decided > 0) ? 'inline' : 'none';
        }

        function applyDecisions() {
            const payload = RAW_CHANGES.map(family => ({
                familyId: family.familyId,
                fields: family.changes.map(change => ({
                    field: change.field,
                    column: change.column,
                    label: change.label,
                    action: decisions[family.familyId][change.field],
                    contactValue: change.contactValue,
                    sheetValue: change.sheetValue
                }))
            }));

            document.getElementById('cardsContainer').style.display = 'none';
            document.getElementById('globalActions').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('loadingOverlay').style.display = 'flex';

            google.script.run
                .withSuccessHandler(onApplyComplete)
                .withFailureHandler(onApplyError)
                .applyContactSyncDecisions(payload);
        }

        function onApplyComplete(result) {
            document.getElementById('loadingOverlay').style.display = 'none';

            if (!result.success) {
                restoreMainUI();
                alert('❌ Erreur : ' + result.error);
                return;
            }

            const r = result.results;
            document.getElementById('resultStats').innerHTML = `
                <div class="stat-box stat-accepted">
                    <div class="num">${r.accepted}</div>
                    <div class="lbl">Champ(s) accepté(s)</div>
                </div>
                <div class="stat-box stat-rejected">
                    <div class="num">${r.rejected}</div>
                    <div class="lbl">Champ(s) conservé(s)</div>
                </div>
                ${r.errors > 0 ? `<div class="stat-box stat-error"><div class="num">${r.errors}</div><div class="lbl">Erreur(s)</div></div>` : ''}
            `;

            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            const footer = document.getElementById('mainFooter');
            footer.innerHTML = '<button class="btn-apply" onclick="google.script.host.close()">Fermer</button>';
            footer.style.justifyContent = 'flex-end';
            footer.style.display = 'flex';
        }

        function onApplyError(error) {
            document.getElementById('loadingOverlay').style.display = 'none';
            restoreMainUI();
            alert('❌ Erreur système : ' + error.message);
        }

        function restoreMainUI() {
            document.getElementById('cardsContainer').style.display = 'flex';
            document.getElementById('globalActions').style.display = 'flex';
            document.getElementById('mainFooter').style.display = 'flex';
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
